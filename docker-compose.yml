services:

  # ─── Banco de Dados ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-sustentabilidade_rural}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sustentabilidade_rural}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Backend ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:          ${NODE_ENV:-production}
      PORT:              3001
      DB_HOST:           db
      DB_PORT:           ${DB_PORT:-5432}
      DB_NAME:           ${DB_NAME:-sustentabilidade_rural}
      DB_USER:           ${DB_USER:-postgres}
      DB_PASSWORD:       ${DB_PASSWORD}
      JWT_SECRET:        ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL:      http://localhost:${APP_PORT:-4300}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Frontend (Nginx + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4300}:80"
    depends_on:
      backend:
        condition: service_healthy

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pgdata:
