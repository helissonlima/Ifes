services:

  # ─── Bootstrap de Segredos ───────────────────────────────────────────────────
  setup:
    image: node:20-alpine
    restart: "no"
    command: ["node", "/scripts/init-secrets.js"]
    volumes:
      - secrets:/run/secrets
      - ./scripts:/scripts:ro

  # ─── Banco de Dados ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -ec
      - |
        export POSTGRES_PASSWORD="$(cat /run/secrets/db_password)"
        exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-sustentabilidade_rural}
      POSTGRES_USER:     ${DB_USER:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sustentabilidade_rural}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Backend ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      NODE_ENV:          ${NODE_ENV:-production}
      PORT:              3001
      DB_HOST:           db
      DB_PORT:           ${DB_PORT:-5432}
      DB_NAME:           ${DB_NAME:-sustentabilidade_rural}
      DB_USER:           ${DB_USER:-postgres}
      DB_PASSWORD_FILE:       /run/secrets/db_password
      JWT_SECRET_FILE:        /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      FRONTEND_URL:      ${FRONTEND_URL:-https://cafe.h3info.com:4300}
    volumes:
      - secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Frontend (Nginx + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4300}:80"
    depends_on:
      backend:
        condition: service_healthy

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  secrets:
